{% extends 'gallery/base.html' %}
{% block title %}Login | Photo Album Manager{% endblock %}
{% block content %}
    <div style="max-width: 480px; margin: 0 auto;">
        <h1 class="section-heading">Account Login</h1>
        <p class="muted">Enter your credentials to view and manage the album.</p>
        <form method="post" style="margin-top: 1.5rem;">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Username</label>
                <input id="id_username" type="text" name="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="id_password">Password</label>
                <input id="id_password" type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
        <p class="muted" style="margin-top:1rem;">Don’t have an account? <a class="link-muted" href="{% url 'register' %}">Register here</a>.</p>
    </div>
{% endblock %}
